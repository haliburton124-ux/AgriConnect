name: agriconnect_mobile
description: AgriConnect mobile app for farmers (Android/iOS) — connects to the Laravel API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
